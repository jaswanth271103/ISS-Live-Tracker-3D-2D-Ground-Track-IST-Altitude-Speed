<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>ISS Live Tracker</title>

<!-- =======================
     STYLES
======================= -->
<style>
html, body {
    margin: 0;
    padding: 0;
    width: 100%;
    height: 100%;
    background: black;
    overflow: hidden;
    font-family: Arial, sans-serif;
}

#globeContainer,
#map2d {
    width: 100vw;
    height: 100vh;
}

/* View buttons */
#view-buttons {
    position: fixed;
    top: 15px;
    left: 15px;
    z-index: 9999;
}

#view-buttons button {
    background: #1f6feb;
    color: white;
    border: none;
    padding: 8px 14px;
    margin-right: 6px;
    border-radius: 6px;
    cursor: pointer;
    font-size: 13px;
}

#btn2d {
    background: #333;
}

/* ISS Panel */
#iss-panel {
    position: fixed;
    top: 15px;
    right: 15px;
    width: 260px;
    background: rgba(0,0,0,0.75);
    color: white;
    padding: 12px;
    border-radius: 8px;
    z-index: 9999;
    font-size: 13px;
}

#iss-panel h3 {
    margin: 0 0 8px 0;
    text-align: center;
    color: #00eaff;
}
</style>

<!-- =======================
     2D MAP LIB (Leaflet)
======================= -->
<link
  rel="stylesheet"
  href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
/>
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

</head>
<body>

<!-- =======================
     VIEW TOGGLE BUTTONS
======================= -->
<div id="view-buttons">
    <button id="btn3d">3D View</button>
    <button id="btn2d">2D View</button>
</div>

<!-- =======================
     ISS DATA PANEL
======================= -->
<div id="iss-panel">
    <h3>🛰 ISS Live Data</h3>
    <div>Latitude: <span id="lat">--</span></div>
    <div>Longitude: <span id="lon">--</span></div>
    <div>Altitude: <span id="alt">--</span> km</div>
    <div>Speed: <span id="speed">--</span> km/h</div>
    <div>IST Time: <span id="time">--</span></div>
</div>

<!-- =======================
     3D & 2D CONTAINERS
======================= -->
<div id="globeContainer"></div>
<div id="map2d" style="display:none;"></div>

<!-- =======================
     THREE + GLOBE (SAFE BUILDS)
======================= -->
<script src="https://unpkg.com/three@0.152.2/build/three.min.js"></script>
<script src="https://unpkg.com/three-globe@2.27.3/dist/three-globe.min.js"></script>

<!-- =======================
     MAIN SCRIPT
======================= -->
<script>
/* =======================
   THREE.JS SETUP
======================= */
const scene = new THREE.Scene();

const camera = new THREE.PerspectiveCamera(
    75,
    window.innerWidth / window.innerHeight,
    0.1,
    1000
);
camera.position.z = 300;

const renderer = new THREE.WebGLRenderer({ antialias: true });
renderer.setSize(window.innerWidth, window.innerHeight);
document.getElementById("globeContainer").appendChild(renderer.domElement);

/* =======================
   GLOBE SETUP
======================= */
const globe = new ThreeGlobe()
    .globeImageUrl('https://unpkg.com/three-globe/example/img/earth-dark.jpg')
    .pointsData([])
    .pointAltitude('size')
    .pointColor('color');

scene.add(globe);

// lighting
scene.add(new THREE.AmbientLight(0xbbbbbb));
const dirLight = new THREE.DirectionalLight(0xffffff, 0.8);
dirLight.position.set(5, 3, 5);
scene.add(dirLight);

/* =======================
   RENDER LOOP
======================= */
function animate() {
    requestAnimationFrame(animate);
    globe.rotation.y += 0.0005;
    renderer.render(scene, camera);
}
animate();

/* =======================
   2D MAP SETUP
======================= */
const map = L.map('map2d').setView([0, 0], 2);

L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
    maxZoom: 6
}).addTo(map);

const issMarker2D = L.circleMarker([0, 0], {
    radius: 6,
    color: 'red'
}).addTo(map);

/* =======================
   VIEW TOGGLE
======================= */
document.getElementById("btn3d").onclick = () => {
    document.getElementById("globeContainer").style.display = "block";
    document.getElementById("map2d").style.display = "none";
};

document.getElementById("btn2d").onclick = () => {
    document.getElementById("globeContainer").style.display = "none";
    document.getElementById("map2d").style.display = "block";
    map.invalidateSize();
};

/* =======================
   REAL-TIME ISS UPDATE
======================= */
function updateISS() {
    fetch("/iss_data")
        .then(res => res.json())
        .then(data => {
            // panel
            document.getElementById("lat").textContent = data.latitude.toFixed(4);
            document.getElementById("lon").textContent = data.longitude.toFixed(4);
            document.getElementById("alt").textContent = data.altitude;
            document.getElementById("speed").textContent = data.velocity;
            document.getElementById("time").textContent = data.timestamp_ist;

            // 3D globe marker
            globe.pointsData([{
                lat: data.latitude,
                lng: data.longitude,
                size: 0.6,
                color: 'red'
            }]);

            // 2D map marker
            issMarker2D.setLatLng([data.latitude, data.longitude]);
        })
        .catch(err => console.error("ISS FETCH ERROR:", err));
}

updateISS();
setInterval(updateISS, 3000);
</script>

</body>
</html>
